name: Cargo Test

on:
  workflow_call:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.4

      - name: Cargo test
        run: >
          cargo test
          --all-features
