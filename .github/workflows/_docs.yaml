name: Cargo Docs

on:
  workflow_call:

jobs:
  check:
    name: Docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.4

      - name: Run Cargo Doc
        run: >
          cargo doc
          --no-deps
          --workspace
          --all-features
          --document-private-items
