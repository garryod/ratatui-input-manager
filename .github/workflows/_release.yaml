name: Release

on:
  workflow_call:

jobs:
  release-plz:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.4

      - name: Create Release
        uses: release-plz/action@v0.5.128
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
