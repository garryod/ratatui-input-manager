name: Cargo Check

on:
  workflow_call:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.4

      - name: Run Clippy
        run: >
          cargo clippy
          --all-targets
          --all-features
