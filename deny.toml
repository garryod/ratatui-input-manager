[graph]
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-unknown-linux-musl",
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "x86_64-pc-windows-msvc",
]
all-features = true

[advisories]
unmaintained = "workspace"
unsound = "all"
ignore = []

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Unicode-DFS-2016",
  "Zlib",
  "WTFPL",
  "Unicode-3.0",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = []
skip = [
  { crate = "bitflags@1.3.2", reason = "termwiz uses this old version" },
  { crate = "getrandom@0.3.4", reason = "termwiz uses this old version" },
  { crate = "syn@1.0.109", reason = "termwiz uses this old version" },
  { crate = "thiserror@1.0.69", reason = "termwiz uses this old version" },
  { crate = "thiserror-impl@1.0.69", reason = "termwiz uses this old version" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
